<a-entity id="player" movement-controls="controls: keyboard, gamepad; speed: 0.22" position="0 0 0" 
      online-entity desktop-controller
      player-config="registerMode: true">
      <a-entity id="bgSndEmmiter" sound="src:#bgm01; autoplay:true; loop:true; rolloffFactor:0.9; refDistance:25; volume:0.6" position="0 2 0"></a-entity>  

      <a-entity id="camera" camera look-controls position="0 1.6 0">
        <a-entity id="respawnPoint" position="0 0 -0.5"></a-entity>
        <a-entity id="debugHud" position="0.0 0.0 -0.5" debug-hud visible="false">
          <a-plane id="debugHudBg" width="0.2" height="0.2" color="#222" opacity="0.7" position="0 0 -0.01" material="shader: flat; transparent: true;"></a-plane>
          <a-entity id="debugHudText" text="value: testing; color: #fff; align: left; width: 0.15; wrapCount: 30; font: fonts/roboto/Roboto-VariableFont_wdth,wght-msdf.json; shader: msdf; negate: false; baseline: center; letterSpacing: 1.2; lineHeight: 28; fontSize: 10;" position="0 0 0"></a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="leftHand" mixin="hand-mixin" hand-controls="hand: left; color: #ffcccc" debug-control="true">
        <a-entity class="hand-collider" position="0 0 0.0" close-detect="objects: .grabbable; size: 0.04; rows: 2; cols: 2; spacing: 0.01"></a-entity>
      </a-entity>
      <a-entity id="rightHand" mixin="hand-mixin" hand-controls="hand: right; color: #ffcccc" debug-control="true">
        <a-entity class="hand-collider" position="0 0 0.0" close-detect="objects: .grabbable; size: 0.04; rows: 2; cols: 2; spacing: 0.01"></a-entity>
      </a-entity>
    </a-entity>
