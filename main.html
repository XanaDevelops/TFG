<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
        <a-assets>
            <a-asset-item id="reset" src="files/reset.glb"></a-asset-item>
        </a-assets>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>

        <a-entity id="reset-bnt" gltf-model="#reset" position="-1 0.5 -3" scale="0.1 0.1 0.1" grabbable></a-entity>
        <a-box position="-1 2 -3" grabbable></a-box>


        <a-entity id="leftHand" hand-controls="hand: left; handModelStyle: lowPoly; color: #ffcccc" laser-controls="hand: left"></a-entity>
        <a-entity id="rightHand" hand-controls="hand: right; handModelStyle: lowPoly; color: #ffcccc" laser-controls="hand: right"></a-entity>

        <a-sky color="#ECECEC"></a-sky>
    </a-scene>
  </body>
</html>
