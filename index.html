<html>

<head>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>

  <script src="https://cdn.jsdelivr.net/gh/MozillaReality/ammo.js@8bbc0ea/builds/ammo.wasm.js"></script>
  <script
    src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.4/dist/aframe-physics-system.min.js"></script>

  <script>
    delete AFRAME.components["grabbable"];
  </script>
  <script src="https://unpkg.com/super-hands@^3.0.6/dist/super-hands.min.js"></script>

  <script src="./js/my-grab.js"></script>
  <script src="./js/hand-event-log.js"></script>
</head>

<body>
  <a-scene stats environment="preset: contact" physics="driver: ammo; debug: true; debugDrawMode: 1">
    <a-assets>
      <a-asset-item id="reset" src="files/reset.glb"></a-asset-item>
    </a-assets>

    <a-entity id="player" movement-controls="controls: keyboard, gamepad" position="0 0 0">
      <a-entity id="camera" camera look-controls position="0 1.6 0"></a-entity>

      <a-entity id="leftHand" sphere-collider="objects: a-box" my-grab hand-controls="hand: left; color: #ffcccc"
        ammo-body="type: kinematic; collisionFilterGroup: 2; collisionFilterMask: 2"
        ammo-shape="type: sphere; fit: manual; sphereRadius: 0.05"></a-entity>
      <a-entity id="rightHand" sphere-collider="objects: a-box" my-grab hand-controls="hand: right; color: #ffcccc"
        ammo-body="type: kinematic; collisionFilterGroup: 2; collisionFilterMask: 2"
        ammo-shape="type: sphere; fit: manual; sphereRadius: 0.05"></a-entity>
    </a-entity>

    <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" visible="false" ammo-body="type: static"
      ammo-shape="type: box"></a-plane>
    <!--- <a-entity id="reset-bnt" gltf-model="#reset" position="-1 0.5 -3" scale="0.1 0.1 0.1" grabbable></a-entity> -->
    <a-box id="testCubo1" class="grabbable" scale="0.5 0.5 0.5" position="-0.5 1 0" color="red"
      ammo-body="type: dynamic; collisionFilterGroup: 1; collisionFilterMask: 1; activationState: disableDeactivation" ammo-shape="type: box">
    </a-box> <!-- hacer MIXIN estas características-->
    <a-box id="testCubo2" class="grabbable" scale="0.5 0.5 0.5" position="-0.5 1 2" color="green"
      ammo-body="type: dynamic; collisionFilterGroup: 1; collisionFilterMask: 1; activationState: disableDeactivation" ammo-shape="type: box">
    </a-box> <!-- hacer MIXIN estas características-->
    <a-box id="testCubo3" class="grabbable" scale="0.5 0.5 0.5" position="-0.5 1 4" color="blue"
      ammo-body="type: dynamic; collisionFilterGroup: 1; collisionFilterMask: 1; activationState: disableDeactivation" ammo-shape="type: box">
    </a-box> <!-- hacer MIXIN estas características-->



    <a-sky color="#ECECEC"></a-sky>
  </a-scene>
</body>

</html>
