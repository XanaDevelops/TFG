<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>
  <!-- <script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script> -->
   <script src="./js/aframe/aframe-environment-component.js"></script>

  <script src="https://cdn.jsdelivr.net/gh/MozillaReality/ammo.js@8bbc0ea/builds/ammo.wasm.js"></script>
  <script
    src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.4/dist/aframe-physics-system.min.js"></script>

  <script>
    delete AFRAME.components["grabbable"];
    delete AFRAME.components["sphere-collider"]
  </script>

  <script src="./js/aframe/aframe-keyboard.min.js"></script>

  <script src="./js/my-grab.js"></script>
  <script src="./js/no-grav.js"></script>
  <script src="./js/hand-event-log.js"></script>
  <script src="./js/death-barrier.js"></script>
  <script src="./js/debug-hud.js"></script>
  <script src="./js/debug-control.js"></script>
  <script src="./js/aframe/sphere-collider.js"></script>
  <script src="./js/keyboard-text.js"></script>

  <script src="./js/moving-platform.js"></script>
  <script src="./js/audio-fix.js"></script>

  <script src="./js/online/online-scene.js"></script>
  <script src="./js/online/online-entity.js"></script>

  <script src="./js/desktop-controller.js"></script>
</head>

<body>
  <!-- Note To Self: si el rendimiento peta es aqui-->
  <a-scene id="mainScene" stats environment="preset: contact; shadow: true; shadowSize:10; lightPosition: 0 10 1; seed:666; playArea:1"
    physics="driver: ammo; debug: false; debugDrawMode: 1; iterations: 60; maxSubSteps: 16" 
    obb-collider="showColliders: false" keyboard-shortcuts="enterVR: false"
    online-scene shadow audio-fix>
    <a-mixin id="base-object" shadow></a-mixin>
    <a-mixin id="hand-mixin" mixin="base-object" ammo-body="type: kinematic; collisionFilterGroup: 2; collisionFilterMask: 2"
      ammo-shape="type: sphere; fit: manual; sphereRadius: 0.01" my-grab > <!-- la mayor chapuza del mundo, pero funciona (aparentemente)-->
    </a-mixin>
    <a-mixin id="grabbable-base" mixin="base-object"
      ammo-body="type: dynamic; collisionFilterGroup: 1; collisionFilterMask: 1; activationState: disableDeactivation"
      grab-fix grab-glow shadow>
    </a-mixin>
    <a-mixin id="grabbable-mixin" mixin="grabbable-base" ammo-shape="type: hull; margin: 0.01" obb-collider></a-mixin>
    <a-mixin id="grabbable-vhacd" mixin="grabbable-base" ammo-shape="type: hacd; margin: 0.01" obb-collider no-grav></a-mixin>

    <!-- Mixin para death barriers -->
    <a-mixin id="death-barrier-mixin" mixin="base-object"
      visible="false"
      ammo-body="type: static; collisionFilterGroup: 3; collisionFilterMask: 3; emitCollisionEvents: true"
      ammo-shape="type: box"
      death-barrier>
    </a-mixin>
    <a-mixin id="static-mixin" mixin="base-object"
      ammo-body="type: static; restitution: 0.75"
      ammo-shape="type: mesh">
    </a-mixin>

    <a-assets>
      <!-- modelos -->
      <a-asset-item id="reset" src="files/reset.glb"></a-asset-item>
      <a-asset-item id="tap" src="files/tap.glb"></a-asset-item>
      <a-asset-item id="foratCercle" src="files/forat_cercle.glb"></a-asset-item>
      <a-asset-item id="foratEquilater" src="files/forat_equilater.glb"></a-asset-item>
      <a-asset-item id="foratIsosceles" src="files/forat_isosceles.glb"></a-asset-item>
      <a-asset-item id="foratQuadrat" src="files/forat_quadrat.glb"></a-asset-item>
      <a-asset-item id="foratRectangle" src="files/forat_rectangle.glb"></a-asset-item>
      <a-asset-item id="foratRectangule" src="files/forat_rectangule.glb"></a-asset-item>
      <a-asset-item id="foratSemicercle" src="files/forat_semicercle2.glb"></a-asset-item>
      <a-assets-item id="woodenTable" src="files/wooden-table/wooden_table_02_4k.gltf"></a-assets-item>
      <a-asset-item id="easterEgg" src="files/easter_egg.glb"></a-asset-item>

      <!-- fuentes-->
      <a-asset-item id="robotoFont" src="fonts/roboto/Roboto-VariableFont_wdth,wght-msdf.json"></a-asset-item>

      <!-- imagenes -->
      <img id="imgTutoriel" src="./img/intrucciones mando pre.png" alt="instrucciones provisionales del mando" srcset="">
      <!-- audios -->
      <audio id="sndEGG" src="./snd/rickroll hq.wav"></audio>
      <audio id="bgm01" src="./snd/019 Scarlet Forest.mp3"></audio>
    </a-assets>

    <a-entity sound="src:#bgm01; autoplay:true; loop:true; rolloffFactor:0.9; refDistance:25; volume:0.6" position="0 2 0"></a-entity>  

    <a-entity id="player" movement-controls="controls: keyboard, gamepad" position="0 0 0" online-entity desktop-controller>
      <a-entity id="camera" camera look-controls position="0 1.6 0">
        <a-entity id="respawnPoint" position="0 0 -0.5"></a-entity>
        <a-entity id="debugHud" position="0.0 0.0 -0.5" debug-hud visible="false">
          <a-plane id="debugHudBg" width="0.2" height="0.2" color="#222" opacity="0.7" position="0 0 -0.01" material="shader: flat; transparent: true;"></a-plane>
          <a-entity id="debugHudText" text="value: testing; color: #fff; align: left; width: 0.15; wrapCount: 30; font: fonts/roboto/Roboto-VariableFont_wdth,wght-msdf.json; shader: msdf; negate: false; baseline: center; letterSpacing: 1.2; lineHeight: 28; fontSize: 10;" position="0 0 0"></a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="leftHand" mixin="hand-mixin" hand-controls="hand: left; color: #ffcccc" debug-control="false">
        <a-entity class="hand-collider" position="0 0 0.0" close-detect="objects: .grabbable; far: 0.0" obb-collider></a-entity>
      </a-entity>
      <a-entity id="rightHand" mixin="hand-mixin" hand-controls="hand: right; color: #ffcccc" debug-control="false">
        <a-entity class="hand-collider" position="0 0 0.0" close-detect="objects: .grabbable; far: 0.0" obb-collider></a-entity>
      </a-entity>
    </a-entity>

    <!-- Entorno -->
    <a-box id="suelo" mixin="static-mixin" position="0 -5 0" rotation="-90 0 0" width="100" height="100" depth="10" visible="false"
      ammo-shape="type: box"></a-box>

    <a-image id="tutoriel" position="-0.57305 1.39529 -3.34007" src="#imgTutoriel"></a-image>

    <a-entity id="taulaFusta" mixin="static-mixin" position="-0.46598 0 -2.76073" gltf-model="#woodenTable"></a-entity>
    <a-entity id="deathBarriers" position="0 0 0">
      <!-- Suelo -->
      <a-box id="bottomDeathBarrier" mixin="death-barrier-mixin" position="0 -50 0" rotation="-90 0 0" width="100" height="100" depth="20"></a-box>
      <!-- Techo -->
      <a-box id="topDeathBarrier" mixin="death-barrier-mixin" position="0 50 0" rotation="90 0 0" width="100" height="100" depth="20"></a-box>
      <!-- Pared trasera (z positiva) -->
      <a-box id="backDeathBarrier" mixin="death-barrier-mixin" position="0 0 50" rotation="0 0 0" width="100" height="100" depth="20"></a-box>
      <!-- Pared delantera (z negativa) -->
      <a-box id="frontDeathBarrier" mixin="death-barrier-mixin" position="0 0 -50" rotation="0 180 0" width="100" height="100" depth="20"></a-box>
      <!-- Pared izquierda (x negativa) -->
      <a-box id="leftDeathBarrier" mixin="death-barrier-mixin" position="-50 0 0" rotation="0 90 0" width="100" height="100" depth="20"></a-box>
      <!-- Pared derecha (x positiva) -->
      <a-box id="rightDeathBarrier" mixin="death-barrier-mixin" position="50 0 0" rotation="0 -90 0" width="100" height="100" depth="20"></a-box>
    </a-entity>
    <!--- <a-entity id="reset-bnt" gltf-model="#reset" position="-1 0.5 -3" scale="0.1 0.1 0.1" grabbable></a-entity> -->


    <!-- Props fisicos-->
    <a-box id="testCubo1" class="grabbable" mixin="grabbable-mixin" scale="0.425 0.425 0.425" position="-0.5 1 -1"
      color="red"></a-box>
    <a-box id="testCubo2" class="grabbable" mixin="grabbable-mixin" scale="0.34 0.34 0.34" position="-0.5 1.45 -1"
      color="green"></a-box>
    <a-box id="testCubo3" class="grabbable" mixin="grabbable-mixin" scale="0.255 0.255 0.255" position="-0.5 1.8 -1"
      color="blue"></a-box>

    <a-sphere id="testEsfera1" class="grabbable" mixin="grabbable-mixin" scale="0.255 0.255 0.255"
      position="0.1 1.05 -1.05" color="#ffcc00" ammo-body="restitution: 0.9"></a-sphere>
    <a-cylinder id="testCilindro1" class="grabbable" mixin="grabbable-mixin" scale="0.2125 0.34 0.2125"
      position="0.6 1.1 -1.15" color="#00bcd4"></a-cylinder>
    <a-cone id="testCono1" class="grabbable" mixin="grabbable-mixin" scale="0.255 0.34 0.255"
      position="1.1 1.05 -1.25" color="#9c27b0"></a-cone>
    <a-torus id="testToro1" class="grabbable" mixin="grabbable-mixin" scale="0.255 0.255 0.255"
      position="1.6 1.1 -1.35" color="#ff5722"></a-torus>

    <a-entity id="eTap" rotation="-28 36.5 -18" gltf-model="#tap" class="grabbable" mixin="grabbable-mixin" scale="0.017 0.017 0.017"
      position="-0.17676 1.2 -2.68384"></a-entity>

    <!-- forats-->
    <a-entity id="eForatSemiC" gltf-model="#foratSemicercle" class="grabbable" mixin="grabbable-vhacd"
      scale="0.0255 0.0255 0.0255" position="1.5 2 -5"></a-entity>
    <a-entity id="eForatCercle" gltf-model="#foratCercle" class="grabbable" mixin="grabbable-vhacd"
      scale="0.0255 0.0255 0.0255" position="2.5 2 -5"></a-entity>
    <a-entity id="eForatEqui" gltf-model="#foratEquilater" class="grabbable" mixin="grabbable-vhacd"
      scale="0.0255 0.0255 0.0255" position="3.5 2 -5"></a-entity>
    <a-entity id="eForatIso" gltf-model="#foratIsosceles" class="grabbable" mixin="grabbable-vhacd"
      scale="0.0255 0.0255 0.0255" position="4.5 2 -5"></a-entity>
    <a-entity id="eForatQuad" gltf-model="#foratQuadrat" class="grabbable" mixin="grabbable-vhacd"
      scale="0.0255 0.0255 0.0255" position="5.5 2 -5"></a-entity>
    <a-entity id="eForatRect" gltf-model="#foratRectangle" class="grabbable" mixin="grabbable-vhacd"
      scale="0.0255 0.0255 0.0255" position="6.5 2 -5"></a-entity>
    <a-entity id="eForatRecta" gltf-model="#foratRectangule" class="grabbable" mixin="grabbable-vhacd"
      scale="0.0255 0.0255 0.0255" position="7.5 2 -5"></a-entity>

    <a-box id="deathCubeTest" scale="0.3 0.3 0.3" position="-2 1 -3" color="black"
      ammo-body="type: static; collisionFilterGroup: 3; collisionFilterMask: 3; emitCollisionEvents: true"
      ammo-shape="type: box" death-barrier>

    </a-box>


    <!-- teclado-->
     <a-text value="Escriu: " id="textoTeclado" rotation="0 54.29290770880168 0" font="fonts/roboto/Roboto-VariableFont_wdth,wght-msdf.json" shader="msdf" negate="false" position="-3.2968 1.84488 -0.85135" keyboard-text>
          <a-entity id="keyboard" rotation="0 0 0" scale="3 3 3" position="0.06945 -0.36282 0.0217" a-keyboard="font: fonts/roboto/Roboto-VariableFont_wdth,wght-msdf.json"></a-entity>
     </a-text>
    

    <a-box id="pruebaPlataforma" mixin="base-object"
      moving-platform-dynamic-velocity
      position="2.10053 1 -2.83199"
      scale="0.8 0.05 0.68"
      ammo-body="type: dynamic; collisionFilterGroup: 1; collisionFilterMask: 1; activationState: disableDeactivation"
      ammo-shape="type: box">
    </a-box>

    <a-light id="eEasterLight" light="type: point; castShadow: false; intensity: 100" position="-5.12728 14.25545 -44.0129" intensity="10"></a-light>
    <a-entity id="eEasterEgg" position="-8.08445 0.13565 -50.29062" scale="2.5 2.5 2.5"mixin="base-object"
      gltf-model="#easterEgg" animation-mixer
      sound="src: #sndEGG; autoplay:true; loop:true; maxDistance:10; distanceModel: exponential; rolloffFactor:1.5; refDistance:1.5;"
    ></a-entity>
      
  </a-scene>


  <script>
      function updateInput(e) {
        e.preventDefault()
        var code = parseInt(e.detail.code)
        console.log(code);
        var event = document.createEvent("HTMLEvents");
        event.initEvent("a-keyboard-updater", true, true);
        event.eventName = "a-keyboard-updater";
        event.detail = e.detail
        document.dispatchEvent(event);
        
      }
      //document.addEventListener('a-keyboard-update', updateInput)
    </script>

  <script>
    (function () {
      var el = document.querySelector('#pruebaPlataforma');
      if (!el) return;

      function applyFriction() {
        var body = el.body;
        if (!body || typeof body.setFriction !== 'function') return;
        body.setFriction(2);
        if (typeof body.activate === 'function') body.activate(true);
      }

      el.addEventListener('body-loaded', applyFriction);
      applyFriction();
    })();
  </script>  
</body>

</html>
